<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>张凌赫海报</title>
    <style>
      :root {
        --bg: #0b0c10;
        --panel: rgba(18, 20, 27, 0.84);
        --line: rgba(255, 255, 255, 0.08);
        --gold: #d8b47a;
        --soft-gold: #f0ddbb;
        --ink: #f5f1e8;
        --accent: #bb4c42;
        --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(187, 76, 66, 0.2), transparent 28%),
          radial-gradient(circle at 20% 20%, rgba(216, 180, 122, 0.18), transparent 30%),
          linear-gradient(135deg, #07080b 0%, #11131a 45%, #090a0d 100%);
        color: var(--ink);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 32px 32px;
        pointer-events: none;
        opacity: 0.34;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 40px 20px;
      }

      .poster {
        position: relative;
        width: min(94vw, 980px);
        aspect-ratio: 4 / 5;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 34px;
        background:
          linear-gradient(160deg, rgba(255, 255, 255, 0.06), transparent 24%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 30%),
          var(--panel);
        box-shadow: var(--shadow);
        isolation: isolate;
      }

      .poster::before,
      .poster::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .poster::before {
        background:
          radial-gradient(circle at 82% 14%, rgba(216, 180, 122, 0.22), transparent 16%),
          radial-gradient(circle at 16% 88%, rgba(187, 76, 66, 0.22), transparent 18%);
        mix-blend-mode: screen;
      }

      .poster::after {
        inset: 18px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 24px;
      }

      .noise {
        position: absolute;
        inset: 0;
        opacity: 0.08;
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.4) 0.5px, transparent 0.8px);
        background-size: 9px 9px;
        pointer-events: none;
      }

      .title-block {
        position: absolute;
        top: 52px;
        left: 54px;
        z-index: 3;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        color: var(--soft-gold);
        font-size: 12px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 44px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--soft-gold));
      }

      .title-cn,
      .title-en {
        margin: 0;
        font-weight: 500;
        line-height: 0.92;
        font-family: "Bodoni MT", "Didot", "STSong", "SimSun", serif;
      }

      .title-cn {
        font-size: clamp(64px, 9vw, 112px);
        letter-spacing: 0.08em;
      }

      .title-en {
        margin-top: 10px;
        font-size: clamp(24px, 3vw, 38px);
        letter-spacing: 0.42em;
        color: rgba(245, 241, 232, 0.72);
        text-indent: 0.42em;
      }

      .deck {
        position: absolute;
        left: 56px;
        bottom: 58px;
        z-index: 3;
        max-width: 360px;
      }

      .deck p {
        margin: 0;
        color: rgba(245, 241, 232, 0.78);
        font-size: 14px;
        line-height: 1.75;
        letter-spacing: 0.08em;
      }

      .deck strong {
        color: var(--soft-gold);
        font-weight: 600;
      }

      .badge {
        position: absolute;
        top: 72px;
        right: 72px;
        z-index: 3;
        width: 110px;
        height: 110px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        display: grid;
        place-items: center;
        color: var(--soft-gold);
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
      }

      .badge span {
        display: block;
        text-align: center;
      }

      .badge .num {
        font-family: "Bodoni MT", "Didot", serif;
        font-size: 34px;
        line-height: 1;
      }

      .badge .txt {
        margin-top: 8px;
        font-size: 9px;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: rgba(245, 241, 232, 0.7);
      }

      .gallery {
        position: absolute;
        inset: 0;
      }

      .frame {
        position: absolute;
        overflow: hidden;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 22px 40px rgba(0, 0, 0, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transform: translateY(24px) scale(0.98);
        opacity: 0;
        transition:
          transform 1s cubic-bezier(0.19, 1, 0.22, 1),
          opacity 0.8s ease;
      }

      body.is-ready .frame {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      .frame::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 18%, rgba(0, 0, 0, 0.14));
        pointer-events: none;
      }

      .frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(0.94) contrast(1.04) brightness(0.92);
        transform: scale(1.02);
      }

      .hero {
        left: 220px;
        top: 132px;
        width: 350px;
        height: 530px;
        z-index: 2;
      }

      .cut-1 {
        right: 78px;
        top: 156px;
        width: 262px;
        height: 190px;
        border-radius: 22px;
        transform: translateY(28px) rotate(4deg) scale(0.98);
        transition-delay: 0.08s;
      }

      .cut-2 {
        right: 100px;
        top: 364px;
        width: 214px;
        height: 306px;
        border-radius: 120px 120px 26px 26px;
        transform: translateY(32px) rotate(-6deg) scale(0.97);
        transition-delay: 0.16s;
      }

      .cut-3 {
        left: 96px;
        top: 450px;
        width: 170px;
        height: 228px;
        border-radius: 18px;
        transform: translateY(36px) rotate(-8deg) scale(0.97);
        transition-delay: 0.24s;
      }

      .cut-4 {
        left: 574px;
        top: 588px;
        width: 218px;
        height: 142px;
        border-radius: 20px;
        transform: translateY(24px) rotate(3deg) scale(0.97);
        transition-delay: 0.32s;
      }

      body.is-ready .cut-1,
      body.is-ready .cut-2,
      body.is-ready .cut-3,
      body.is-ready .cut-4 {
        transform: translateY(0) rotate(var(--tilt, 0deg)) scale(1);
      }

      .cut-1 { --tilt: 4deg; }
      .cut-2 { --tilt: -6deg; }
      .cut-3 { --tilt: -8deg; }
      .cut-4 { --tilt: 3deg; }

      .label-vertical {
        position: absolute;
        right: 40px;
        top: 270px;
        z-index: 3;
        writing-mode: vertical-rl;
        color: rgba(245, 241, 232, 0.6);
        font-size: 12px;
        letter-spacing: 0.34em;
      }

      .footer-mark {
        position: absolute;
        right: 54px;
        bottom: 50px;
        z-index: 3;
        display: flex;
        align-items: end;
        gap: 16px;
      }

      .footer-mark .issue {
        color: var(--accent);
        font-family: "Bodoni MT", "Didot", serif;
        font-size: 72px;
        line-height: 0.9;
      }

      .footer-mark .meta {
        padding-bottom: 8px;
        color: rgba(245, 241, 232, 0.72);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .line-accent {
        position: absolute;
        left: 54px;
        top: 240px;
        width: 132px;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), transparent);
        z-index: 3;
      }

      .info-chip {
        position: absolute;
        top: 262px;
        left: 56px;
        z-index: 3;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        font-size: 11px;
        letter-spacing: 0.26em;
        color: rgba(245, 241, 232, 0.68);
        background: rgba(255, 255, 255, 0.03);
        text-transform: uppercase;
      }

      @media (max-width: 900px) {
        .poster {
          aspect-ratio: auto;
          min-height: 1480px;
        }

        .title-block,
        .deck,
        .badge,
        .footer-mark,
        .label-vertical,
        .line-accent,
        .info-chip {
          position: relative;
          inset: auto;
        }

        .title-block {
          padding: 38px 28px 0;
        }

        .line-accent {
          margin: 18px 0 0 28px;
        }

        .info-chip {
          display: inline-block;
          margin: 18px 0 0 28px;
        }

        .badge {
          position: absolute;
          top: 28px;
          right: 28px;
          width: 92px;
          height: 92px;
        }

        .gallery {
          position: relative;
          height: 920px;
          margin-top: 12px;
        }

        .hero {
          left: 26px;
          top: 40px;
          width: calc(100% - 52px);
          height: 480px;
        }

        .cut-1 {
          right: 26px;
          top: 398px;
          width: 220px;
          height: 150px;
        }

        .cut-2 {
          right: 34px;
          top: 566px;
          width: 170px;
          height: 244px;
        }

        .cut-3 {
          left: 26px;
          top: 580px;
          width: 148px;
          height: 200px;
        }

        .cut-4 {
          left: 188px;
          top: 770px;
          width: 170px;
          height: 114px;
        }

        .label-vertical {
          position: absolute;
          right: 12px;
          top: 530px;
        }

        .deck {
          margin: 34px 28px 0;
          max-width: none;
        }

        .footer-mark {
          justify-content: space-between;
          align-items: end;
          margin: 26px 28px 36px;
        }
      }

      @media (max-width: 560px) {
        .page {
          padding: 14px;
        }

        .poster {
          border-radius: 24px;
          min-height: 1340px;
        }

        .title-cn {
          font-size: 58px;
        }

        .title-en {
          font-size: 18px;
        }

        .hero {
          height: 430px;
        }

        .cut-1 {
          width: 184px;
          height: 126px;
        }

        .cut-2 {
          width: 154px;
          height: 220px;
        }

        .cut-4 {
          left: 164px;
          width: 146px;
          height: 102px;
        }

        .footer-mark .issue {
          font-size: 54px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="poster" aria-label="张凌赫时尚海报">
        <div class="noise"></div>

        <div class="title-block">
          <div class="eyebrow">Editorial Poster</div>
          <h1 class="title-cn">张凌赫</h1>
          <p class="title-en">ZHANG LINGHE</p>
        </div>

        <div class="line-accent"></div>
        <div class="info-chip">cool glass mood / 2026</div>

        <div class="badge">
          <span>
            <span class="num">05</span>
            <span class="txt">selected frames</span>
          </span>
        </div>

        <div class="gallery">
          <figure class="frame hero">
            <img src="./张凌赫/zhang_linghe_glasses_2023_1.jpeg" alt="张凌赫海报主图" />
          </figure>

          <figure class="frame cut-1">
            <img src="./张凌赫/zhang_linghe_glasses_2023_3.jpeg" alt="张凌赫横幅照片" />
          </figure>

          <figure class="frame cut-2">
            <img src="./张凌赫/zhang_linghe_glasses_2023_2.jpeg" alt="张凌赫半身照" />
          </figure>

          <figure class="frame cut-3">
            <img src="./张凌赫/zhang_linghe_glasses_2023_4.jpeg" alt="张凌赫侧身照" />
          </figure>

          <figure class="frame cut-4">
            <img src="./张凌赫/zhang_linghe_glasses_2023_5.jpeg" alt="张凌赫细节照" />
          </figure>
        </div>

        <div class="label-vertical">GLASS / SHADOW / EDGE / SILENCE</div>

        <div class="deck">
          <p>
            用五张图做成一张偏时尚杂志感的纵向海报。
            <strong>主图拉满气场</strong>，副图用错位切片去制造节奏，
            让整体既冷感又不空。
          </p>
        </div>

        <div class="footer-mark">
          <div class="issue">01</div>
          <div class="meta">
            poster edition<br />
            modern editorial layout
          </div>
        </div>
      </section>
    </main>

    <script>
      window.addEventListener("load", () => {
        document.body.classList.add("is-ready");
      });
    </script>
  </body>
</html>
