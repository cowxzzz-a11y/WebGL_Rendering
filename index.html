<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 光照策略查看器</title>
    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(7, 11, 15, 0.52);
        --panel-border: rgba(255, 255, 255, 0.12);
        --panel-shadow: 0 18px 48px rgba(0, 0, 0, 0.2);
        --panel-text: #f6f7f8;
        --panel-muted: rgba(246, 247, 248, 0.72);
        --panel-soft: rgba(255, 255, 255, 0.08);
        --panel-soft-strong: rgba(255, 255, 255, 0.14);
        --panel-accent: #d9e6f7;
        --panel-accent-text: #071018;
        --panel-active: #ef6f62;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(255, 214, 170, 0.35), transparent 28%),
          linear-gradient(180deg, #d8d6d3 0%, #cfc8bf 100%);
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      }

      body {
        color: var(--panel-text);
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .panel-shell {
        position: fixed;
        top: 16px;
        z-index: 12;
        pointer-events: none;
      }

      .panel-shell > * {
        pointer-events: auto;
      }

      .left-panel-shell {
        left: 16px;
      }

      .right-panel-shell {
        right: 16px;
      }

      .panel {
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: var(--panel-bg);
        color: var(--panel-text);
        box-shadow: var(--panel-shadow);
        backdrop-filter: blur(18px);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .left-panel {
        width: 300px;
        max-height: calc(100vh - 32px);
        padding: 16px;
        overflow: auto;
      }

      .right-panel {
        width: 320px;
        max-height: calc(100vh - 32px);
        padding: 14px 14px 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .panel-shell.is-collapsed .panel {
        opacity: 0;
        pointer-events: none;
      }

      .left-panel-shell.is-collapsed .panel {
        transform: translateX(-18px) scale(0.98);
      }

      .right-panel-shell.is-collapsed .panel {
        transform: translateX(18px) scale(0.98);
      }

      .panel-collapse-btn {
        position: absolute;
        top: 8px;
        width: 26px;
        height: 26px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        color: var(--panel-text);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.14);
        transition: background 0.2s ease, transform 0.2s ease;
      }

      .panel-collapse-btn:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      .left-panel-shell .panel-collapse-btn {
        left: 10px;
      }

      .right-panel-shell .panel-collapse-btn {
        right: 10px;
      }

      .panel-shell.is-collapsed .panel-collapse-btn {
        transform: scale(1.04);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--panel-muted);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .panel h1,
      .panel h2,
      .panel h3,
      .panel p {
        margin: 0;
      }

      .panel h1 {
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .panel h2 {
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.92);
      }

      .panel h3 {
        font-size: 12px;
        color: var(--panel-muted);
      }

      .section + .section {
        margin-top: 14px;
      }

      .status-list {
        display: grid;
        gap: 8px;
      }

      .status-item,
      .control-stack {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
      }

      .status-item {
        font-size: 12px;
        line-height: 1.45;
        color: var(--panel-muted);
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        padding: 8px 12px;
        border: 0;
        border-radius: 10px;
        background: var(--panel-accent);
        color: var(--panel-accent-text);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: var(--panel-soft);
        color: var(--panel-text);
      }

      button.active {
        background: var(--panel-active);
        color: #fff7f8;
      }

      .range-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--panel-muted);
      }

      .range-value {
        color: var(--panel-text);
        font-variant-numeric: tabular-nums;
      }

      .range-help {
        margin-top: 6px;
        font-size: 11px;
        color: var(--panel-muted);
        line-height: 1.45;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #f6b77a;
      }

      .tab-bar {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
        padding: 4px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
      }

      .tab-btn {
        flex: 1;
        padding: 8px 0;
        background: transparent;
        color: var(--panel-muted);
        border-radius: 8px;
      }

      .tab-btn.is-active {
        background: var(--panel-soft-strong);
        color: var(--panel-text);
      }

      .tab-panel {
        display: none;
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding-right: 2px;
      }

      .tab-panel.is-active {
        display: block;
      }

      .tree-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tree-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
      }

      .tree-item.selected {
        outline: 1px solid rgba(255, 128, 152, 0.85);
        background: rgba(255, 128, 152, 0.12);
      }

      .tree-item input[type="checkbox"] {
        margin: 0;
      }

      .tree-label {
        flex: 1;
        min-width: 0;
        font-size: 12px;
        line-height: 1.45;
        word-break: break-word;
      }

      .tree-type {
        display: block;
        margin-top: 2px;
        color: var(--panel-muted);
        font-size: 11px;
      }

      .empty {
        padding: 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--panel-muted);
        font-size: 12px;
      }

      canvas.is-fly-look {
        cursor: grabbing;
      }

      @media (max-width: 960px) {
        .left-panel {
          width: 248px;
        }

        .right-panel {
          width: 284px;
        }
      }
    </style>
  </head>
  <body>
    <div class="panel-shell left-panel-shell" id="left-panel-shell">
      <button
        id="left-panel-toggle"
        class="panel-collapse-btn"
        type="button"
        aria-label="收起左侧面板"
      >
        &lt;
      </button>
      <div class="panel left-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Lighting Strategy</p>
            <h1>Three.js 光照策略查看器</h1>
          </div>
        </div>

        <section class="section">
          <h2>状态</h2>
          <div class="status-list">
            <div id="status-model" class="status-item">模型: 等待加载</div>
            <div id="status-hdr" class="status-item">HDR: 等待加载</div>
            <div id="status-selection" class="status-item">当前选中: 无</div>
            <div id="status-render" class="status-item">渲染: 准备中</div>
          </div>
        </section>

        <section class="section">
          <h2>资源</h2>
          <div class="button-row">
            <button id="show-demo-btn" type="button">加载内置演示</button>
            <button id="pick-glb-btn" type="button" class="secondary">
              选择本地 GLB
            </button>
          </div>
          <div class="button-row" style="margin-top: 8px">
            <button id="load-default-hdr-btn" type="button">加载默认 HDR</button>
            <button id="pick-hdr-btn" type="button" class="secondary">
              选择本地 HDR
            </button>
          </div>
        </section>

        <section class="section">
          <h2>渲染策略</h2>

          <div class="control-stack">
            <div class="range-label">
              <span>交互预览比例</span>
              <span id="interactive-scale-value" class="range-value">58%</span>
            </div>
            <input
              id="interactive-scale-range"
              type="range"
              min="0.35"
              max="1"
              step="0.01"
              value="0.58"
            />
            <div class="range-help">
              相机移动和拖拽物体时优先保证响应速度，对应文档里的“交互态低分辨率”。
            </div>
          </div>

          <div class="control-stack" style="margin-top: 8px">
            <div class="range-label">
              <span>静止累积比例</span>
              <span id="static-scale-value" class="range-value">100%</span>
            </div>
            <input
              id="static-scale-range"
              type="range"
              min="0.5"
              max="1"
              step="0.01"
              value="1"
            />
            <div class="range-help">
              镜头停下后切到这个比例并持续累积，对应“静止后高质量累积”。
            </div>
          </div>

          <div class="control-stack" style="margin-top: 8px">
            <div class="range-label">
              <span>静止判定延迟</span>
              <span id="idle-delay-value" class="range-value">420ms</span>
            </div>
            <input
              id="idle-delay-range"
              type="range"
              min="120"
              max="1200"
              step="20"
              value="420"
            />
          </div>

          <div class="control-stack" style="margin-top: 8px">
            <div class="range-label">
              <span>最大累积样本</span>
              <span id="max-samples-value" class="range-value">48</span>
            </div>
            <input
              id="max-samples-range"
              type="range"
              min="1"
              max="96"
              step="1"
              value="48"
            />
          </div>
        </section>

        <section class="section">
          <h2>操作</h2>
          <div class="button-row">
            <button id="reset-view-btn" type="button" class="secondary">
              重置视角
            </button>
            <button id="clear-selection-btn" type="button" class="secondary">
              取消选中
            </button>
            <button id="toggle-move-btn" type="button" class="active">
              物体移动已开
            </button>
          </div>
        </section>

        <section class="section">
          <div class="control-stack">
            <div class="range-label">
              <span>UE 视角速度</span>
              <span id="move-speed-value" class="range-value">4.0</span>
            </div>
            <input
              id="move-speed-range"
              type="range"
              min="0.5"
              max="20"
              step="0.1"
              value="4.0"
            />
          </div>
        </section>
      </div>
    </div>

    <div class="panel-shell right-panel-shell" id="right-panel-shell">
      <button
        id="right-panel-toggle"
        class="panel-collapse-btn"
        type="button"
        aria-label="收起右侧面板"
      >
        &gt;
      </button>
      <div class="panel right-panel">
        <div class="panel-header">
          <h2>检查器</h2>
        </div>

        <div class="tab-bar">
          <button class="tab-btn is-active" type="button" data-tab-target="objects">
            对象
          </button>
          <button class="tab-btn" type="button" data-tab-target="material">
            材质
          </button>
          <button class="tab-btn" type="button" data-tab-target="basic">
            基础
          </button>
          <button class="tab-btn" type="button" data-tab-target="lights">
            灯光
          </button>
        </div>

        <div class="tab-panel is-active" data-tab-panel="objects">
          <div class="button-row" style="margin-bottom: 10px">
            <button id="show-all-btn" type="button" class="secondary">全部显示</button>
          </div>
          <div id="object-list" class="tree-list"></div>
        </div>

        <div class="tab-panel" data-tab-panel="material">
          <div id="material-inspector" class="tree-list"></div>
        </div>

        <div class="tab-panel" data-tab-panel="basic">
          <div id="basic-info-inspector" class="tree-list"></div>
        </div>

        <div class="tab-panel" data-tab-panel="lights">
          <div id="light-inspector" class="tree-list"></div>
        </div>
      </div>
    </div>

    <input id="glb-input" type="file" accept=".glb,.gltf" hidden />
    <input id="hdr-input" type="file" accept=".hdr" hidden />

    <div id="app"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
